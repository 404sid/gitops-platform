apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-app-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/404sid/gitops-platform
    targetRevision: main
    path: helm
    helm:
      releaseName: gitops-app
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
