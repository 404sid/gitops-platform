name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: |
          404sid/gitops-app:latest
          404sid/gitops-app:${{ github.sha }}

    - name: Update Helm values with new image tag
      run: |
        sed -i "s|repository: .*|repository: 404sid/gitops-app|" helm/values.yaml
        sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|" helm/values.yaml
        git config user.email "ci@gitops"
        git config user.name "CI Bot"
        git add helm/values.yaml
        git commit -m "ci: update image tag to ${{ github.sha }}"
        git push
